<html lang="pt-BR">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --txt:#e6edf3;--txt2:#8b949e;--txt3:#484f58;
  --verde:#3fb950;--ouro:#d29922;--ouro-claro:#f0c94a;
  --vivo:#f85149;--brasil:#009739;--borda:#30363d;--borda2:#21262d;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;overflow-x:hidden;}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;}
.main{flex:1;padding-bottom:72px;}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--borda);padding:14px 16px 12px;position:sticky;top:0;z-index:50;}
.header-row{display:flex;align-items:center;justify-content:space-between;}
.header h1{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:.03em;color:var(--ouro-claro);}
.header-sub{font-size:11px;color:var(--txt2);margin-top:2px;}
.header-badge{font-size:11px;background:var(--bg3);border:1px solid var(--borda);padding:4px 10px;border-radius:20px;color:var(--txt2);}

/* DESTAQUE */
.destaque-wrap{padding:14px 14px 0;}
.destaque-card{background:var(--bg2);border:1px solid var(--borda);border-radius:12px;padding:14px 16px;}
.destaque-card.vivo{border-color:var(--vivo);}
.destaque-card.br-next{border-color:var(--brasil);}
.destaque-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.d-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--txt2);}
.s-vivo{color:var(--vivo);font-size:11px;font-weight:700;}
.s-hoje{color:var(--ouro);font-size:11px;font-weight:600;}
.s-data{font-size:11px;color:var(--txt2);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.pulse::before{content:'● ';animation:pulse 1.2s infinite;}
.destaque-times{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;}
.d-time{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;}
.d-flag{font-size:32px;line-height:1;}
.d-nome{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--txt);}
.d-score{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;color:var(--txt);letter-spacing:.05em;text-align:center;line-height:1;}
.d-hora{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--txt2);text-align:center;}
.d-info{text-align:center;margin-top:10px;font-size:11px;color:var(--txt2);}

/* FILTROS */
.filtro-bar{padding:12px 14px 0;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
.filtro-bar::-webkit-scrollbar{display:none;}
.fp{padding:5px 12px;border-radius:20px;border:1px solid var(--borda);background:transparent;color:var(--txt2);font-family:'Barlow',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.fp.ativo{background:var(--ouro);border-color:var(--ouro);color:#000;font-weight:600;}

/* SEÇÃO DATA */
.sec-data{padding:14px 14px 4px;}
.sec-label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--txt2);}

/* CARD JOGO */
.jc{background:var(--bg2);border:1px solid var(--borda);border-radius:10px;padding:10px 14px;margin:0 14px 8px;}
.jc.br{border-left:3px solid var(--brasil);padding-left:11px;}
.jc.vv{border-color:var(--vivo);}
.jc-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.jc-grp{font-size:10px;color:var(--txt3);}
.bv{font-size:10px;font-weight:700;color:var(--vivo);}
.be{font-size:10px;color:var(--txt3);}
.bh{font-size:10px;font-weight:600;color:var(--ouro);}
.bp{font-size:10px;color:var(--txt3);}
.jc-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;}
.jt{display:flex;align-items:center;gap:7px;}
.jt.v{flex-direction:row-reverse;}
.jt-flag{font-size:19px;flex-shrink:0;}
.jt-nome{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;}
.jt.v .jt-nome{text-align:right;}
.jt-mid{text-align:center;min-width:44px;}
.jt-score{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--txt);letter-spacing:.05em;}
.jt-hora{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--txt2);}
.jt-hora.hj{color:var(--ouro);}

/* GRUPOS */
.g-bloco{margin:14px 14px 0;}
.g-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.g-tag{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:.08em;background:var(--ouro);color:#000;padding:3px 10px;border-radius:5px;}
.tabela{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:12px;}
.tabela th{font-size:10px;font-weight:600;color:var(--txt2);text-align:left;padding:4px 5px;letter-spacing:.05em;border-bottom:1px solid var(--borda);}
.tabela td{color:var(--txt);padding:5px 5px;border-bottom:1px solid var(--borda2);}
.tabela tr:last-child td{border-bottom:none;}
.num{text-align:center;color:var(--txt2);}
.pts{font-weight:700;color:var(--txt);text-align:center;}
.cl-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--verde);margin-right:4px;vertical-align:middle;}
.g-jogos-lbl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--txt2);margin-bottom:6px;margin-top:4px;}
.g-divider{height:1px;background:var(--borda);margin:16px 0;}

/* MATA-MATA */
.mm-fase{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ouro);padding:14px 14px 6px;}
.mm-jogo{background:var(--bg2);border:1px solid var(--borda);border-radius:10px;padding:10px 14px;margin:0 14px 8px;}
.mm-data{font-size:10px;color:var(--txt3);margin-bottom:7px;}
.mm-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;}
.mm-t{display:flex;align-items:center;gap:7px;}
.mm-t.v{flex-direction:row-reverse;}
.mm-nome{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:95px;}
.mm-t.v .mm-nome{text-align:right;}
.mm-mid{text-align:center;min-width:44px;}
.mm-vs{font-size:11px;color:var(--txt3);font-weight:600;}
.mm-score{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--txt);}
.mm-hora{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--txt2);}

/* VAZIO */
.vazio{text-align:center;padding:40px 20px;color:var(--txt2);font-size:13px;}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--borda);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;cursor:pointer;border:none;background:transparent;color:var(--txt3);font-family:'Barlow',sans-serif;font-size:10px;transition:color .15s;}
.nb.ativo{color:var(--ouro-claro);}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
</style>
</head>

function pd(s){const[d,t]=s.split('T');const[y,m,dd]=d.split('-').map(Number);const[h,mi]=t.split(':').map(Number);return new Date(y,m-1,dd,h,mi);}
function dk(dt){return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;}
function hoje(){return dk(new Date());}
function fhora(dt){return dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function flong(dt){return dt.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});}
function fcurta(dt){return dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}).replace('.','');}
function st(dt){const n=new Date(),d=(dt-n)/60000;if(d>0&&d<=110)return'v';if(d<=0)return'e';return'p';}
function ish(dt){return dk(dt)===hoje();}

function destaque(){
  const now=new Date();
  const s=[...J].map(j=>({...j,o:pd(j.dt)})).sort((a,b)=>a.o-b.o);
  let d=s.find(j=>st(j.o)==='v')||s.find(j=>j.o>=now)||s[s.length-1];
  if(!d)return'';
  const ss=st(d.o),eh=ish(d.o);
  const stHtml=ss==='v'?`<span class="s-vivo pulse">AO VIVO</span>`:eh?`<span class="s-hoje">HOJE</span>`:`<span class="s-data">${fcurta(d.o)}</span>`;
  const mid=ss==='e'?`<div class="d-score">- × -</div>`:ss==='v'?`<div class="d-score">? × ?</div>`:`<div class="d-hora">${fhora(d.o)}</div>`;
  return`<div class="destaque-wrap"><div class="destaque-card${ss==='v'?' vivo':''}${d.b?' br-next':''}">
    <div class="destaque-top"><span class="d-label">${ss==='v'?'Ao vivo':ss==='e'?'Encerrado':'Próximo jogo'} · Grupo ${d.g}</span>${stHtml}</div>
    <div class="destaque-times">
      <div class="d-time"><span class="d-flag">${fl(d.c)}</span><span class="d-nome">${d.c}</span></div>
      <div>${mid}</div>
      <div class="d-time"><span class="d-flag">${fl(d.v)}</span><span class="d-nome">${d.v}</span></div>
    </div>
    <div class="d-info">${d.l} · ${flong(d.o)}</div>
  </div></div>`;
}

function jogoCard(j,sg=true){
  const o=pd(j.dt),ss=st(o),eh=ish(o);
  const badge=ss==='v'?`<span class="bv">● AO VIVO</span>`:ss==='e'?`<span class="be">Encerrado</span>`:eh?`<span class="bh">Hoje</span>`:`<span class="bp">${fcurta(o)}</span>`;
  const mid=ss==='e'?`<span class="jt-score">- × -</span>`:ss==='v'?`<span class="jt-score">? × ?</span>`:`<span class="jt-hora${eh?' hj':''}">${fhora(o)}</span>`;
  const meta=sg?`Grupo ${j.g} · R${j.r} · ${j.l}`:`R${j.r} · ${j.l}`;
  return`<div class="jc${j.b?' br':''}${ss==='v'?' vv':''}">
    <div class="jc-meta"><span class="jc-grp">${meta}</span>${badge}</div>
    <div class="jc-row">
      <div class="jt"><span class="jt-flag">${fl(j.c)}</span><span class="jt-nome">${j.c}</span></div>
      <div class="jt-mid">${mid}</div>
      <div class="jt v"><span class="jt-flag">${fl(j.v)}</span><span class="jt-nome">${j.v}</span></div>
    </div>
  </div>`;
}

function abaJogos(){
  const datas=[...new Set(J.map(j=>dk(pd(j.dt))))].sort();
  let pills=`<div class="filtro-bar" id="fb"><button class="fp ativo" onclick="fd('todos',this)">Todos</button><button class="fp" onclick="fd('hoje',this)">Hoje</button><button class="fp" onclick="fd('brasil',this)">🇧🇷 Brasil</button>`;
  datas.forEach(d=>{const o=new Date(d+'T12:00');pills+=`<button class="fp" onclick="fd('${d}',this)">${fcurta(o)}</button>`;});
  pills+='</div>';
  let lista='<div id="lj">';
  datas.forEach(d=>{
    const jd=J.filter(j=>dk(pd(j.dt))===d).sort((a,b)=>pd(a.dt)-pd(b.dt));
    lista+=`<div class="sec-data" data-dk="${d}"><span class="sec-label">${flong(pd(jd[0].dt))}</span></div>`;
    jd.forEach(j=>{lista+=jogoCard(j);});
  });
  lista+='</div>';
  return destaque()+pills+lista;
}

window.fd=function(f,btn){
  document.querySelectorAll('.fp').forEach(p=>p.classList.remove('ativo'));
  btn.classList.add('ativo');
  const lj=document.getElementById('lj');
  const hj=hoje();
  let h='';
  if(f==='todos'){
    const datas=[...new Set(J.map(j=>dk(pd(j.dt))))].sort();
    datas.forEach(d=>{
      const jd=J.filter(j=>dk(pd(j.dt))===d).sort((a,b)=>pd(a.dt)-pd(b.dt));
      h+=`<div class="sec-data" data-dk="${d}"><span class="sec-label">${flong(pd(jd[0].dt))}</span></div>`;
      jd.forEach(j=>{h+=jogoCard(j);});
    });
  } else if(f==='hoje'){
    const jd=J.filter(j=>dk(pd(j.dt))===hj).sort((a,b)=>pd(a.dt)-pd(b.dt));
    if(jd.length){h+=`<div class="sec-data"><span class="sec-label">${flong(pd(jd[0].dt))}</span></div>`;jd.forEach(j=>{h+=jogoCard(j);});}
    else h='<div class="vazio">Nenhum jogo hoje.</div>';
  } else if(f==='brasil'){
    const jb=J.filter(j=>j.b).sort((a,b)=>pd(a.dt)-pd(b.dt));
    let ld='';
    jb.forEach(j=>{const d=dk(pd(j.dt));if(d!==ld){h+=`<div class="sec-data"><span class="sec-label">${flong(pd(j.dt))}</span></div>`;ld=d;}h+=jogoCard(j);});
    if(!h)h='<div class="vazio">Nenhum jogo encontrado.</div>';
  } else {
    const jd=J.filter(j=>dk(pd(j.dt))===f).sort((a,b)=>pd(a.dt)-pd(b.dt));
    if(jd.length){h+=`<div class="sec-data"><span class="sec-label">${flong(pd(jd[0].dt))}</span></div>`;jd.forEach(j=>{h+=jogoCard(j);});}
    else h='<div class="vazio">Nenhum jogo nesta data.</div>';
  }
  lj.innerHTML=h;
};

function abaMataMata(){
  let h=destaque();
  MM.forEach(bloco=>{
    h+=`<div class="mm-fase">${bloco.fase}</div>`;
    bloco.jogos.forEach(j=>{
      const o=pd(j.dt),ss=st(o);
      const mid=ss==='e'?`<span class="mm-score">- × -</span>`:ss==='v'?`<span class="mm-score">? × ?</span>`:`<span class="mm-hora">${fhora(o)}</span>`;
      h+=`<div class="mm-jogo">
        <div class="mm-data">${flong(o)} · ${j.l}</div>
        <div class="mm-row">
          <div class="mm-t"><span class="jt-flag">${fl(j.c)}</span><span class="mm-nome">${j.c}</span></div>
          <div class="mm-mid">${mid}</div>
          <div class="mm-t v"><span class="jt-flag">${fl(j.v)}</span><span class="mm-nome">${j.v}</span></div>
        </div>
      </div>`;
    });
  });
  return h;
}

function abaGrupos(){
  let h='';
  Object.entries(GRUPOS).forEach(([l,g])=>{
    h+=`<div class="g-bloco"><div class="g-header"><span class="g-tag">GRUPO ${l}</span></div>`;
    h+=`<table class="tabela"><thead><tr><th style="width:44%">Seleção</th><th class="num">PJ</th><th class="num">V</th><th class="num">E</th><th class="num">D</th><th class="num">SG</th><th class="pts">PTS</th></tr></thead><tbody>`;
    g.t.forEach((t,i)=>{
      const dot=i<2?`<span class="cl-dot"></span>`:'';
      h+=`<tr><td>${dot}<span style="font-size:14px;margin-right:4px">${fl(t)}</span>${t}</td><td class="num">0</td><td class="num">0</td><td class="num">0</td><td class="num">0</td><td class="num">0</td><td class="pts">0</td></tr>`;
    });
    h+=`</tbody></table>`;
    h+=`<div class="g-jogos-lbl">Jogos do grupo</div>`;
    J.filter(j=>j.g===l).sort((a,b)=>pd(a.dt)-pd(b.dt)).forEach(j=>{h+=jogoCard(j,false);});
    h+=`<div class="g-divider"></div></div>`;
  });
  return h;
}

let aba='jogos';
function setAba(a){
  aba=a;
  ['jogos','matamata','grupos'].forEach(x=>document.getElementById('btn-'+x).classList.toggle('ativo',x===a));
  const m=document.getElementById('main');
  if(a==='jogos')m.innerHTML=abaJogos();
  else if(a==='matamata')m.innerHTML=abaMataMata();
  else m.innerHTML=abaGrupos();
  m.scrollTop=0;
}

setAba('jogos');
setInterval(()=>setAba(aba),60000);
